name: Dependabot auto-merge

# Auto-merge patch and minor Dependabot PRs once CI passes.
# Major bumps stay open for human review (breaking changes possible —
# especially on actions that touch the cosign signing pipeline).
#
# Branch protection on `main` enforces `Build & verify` as a required
# status check, so `gh pr merge --auto` queues the PR and only merges
# once the build is green. If CI fails, the PR stays open.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge patch/minor
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for patch + minor
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
