# French locale pack — source of truth for the OSS storefront UI strings.
#
# Format: nested namespaces. Final values are interpolated via `{name}`
# placeholders (resolved by useT() at render time).
#
# Convention:
#   - lower-snake_case for keys
#   - logical grouping by feature (cart.*, blog.*, account.*, etc.)
#   - keep keys stable; rename = breaking change for translators
#
# To contribute another language: copy this file to `<locale>.yaml` and
# translate the values. Keys must stay identical.

