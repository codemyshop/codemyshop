  cta_full: Complet ce mois-ci
  signature: Alexandre Carette · Fondateur CodeMyShop · Metz, France

probleme:
  kicker: Le constat
  heading: Vous payez pour un système qui ne vous appartient pas.
  lede: Six réalités que vivent les e-commerçants français en 2026.
  pain1_title: Commissions qui grimpent
  pain1_desc: Les plateformes SaaS prélèvent 0,5 à 2 % de commission sur chaque vente, auxquels s'ajoutent les abonnements aux applications tierces. À mesure que votre chiffre d'affaires croît, ces coûts augmentent proportionnellement.
  pain2_title: SEO bridé par la plateforme
  pain2_desc: URLs imposées, vitesse médiocre, Core Web Vitals dans le rouge. Google vous pénalise et vous ne pouvez rien faire.
  pain3_title: Données hors de France
  pain3_desc: Vos clients, commandes et catalogue sont sur des serveurs américains. Un changement de CGU et vous perdez l'accès à votre propre business.
  pain4_title: Vos données financent l'IA de vos concurrents
  pain4_desc: "Sur les plateformes mutualisées, le comportement de vos clients améliore l'algorithme global — qui profite à tout le monde sauf à vous. Votre intelligence métier nourrit la machine de vos concurrents."
  pain5_title: Équipe réduite, trop d'outils
  pain5_desc: Un outil pour le SEO, un pour l'email, un pour le social, un pour le CRM. Rien ne communique. Vous gérez vos outils au lieu de vendre.
  pain6_title: Dépendance totale
  pain6_desc: Une décision prise à San Francisco peut couper votre boutique du jour au lendemain. Vous êtes locataire de votre propre vitrine.

navpages:
  heading: Allez plus loin
  lede: Quatre pages pour comprendre qui je suis et pourquoi c'est différent.
  page1_title: Pourquoi la souveraineté numérique est une urgence
  page1_desc: En 2026, dépendre d'une plateforme américaine pour votre e-commerce, c'est accepter de ne rien contrôler. J'ai écrit pourquoi — et ce que je fais pour changer ça.
  page1_cta: Lire le manifeste
  page2_title: Du Macintosh de mon papa à CodeMyShop
  page2_desc: Informatique à 5 ans, salons pirates d'AOL à 13, marque de skateboard à 24, expert PrestaShop à 35. L'histoire derrière 10 ans d'obsession e-commerce.
  page2_cta: Découvrir mon parcours
  page3_title: Distribuez notre infrastructure à votre réseau
  page3_desc: "Devenez ambassadeur CodeMyShop. 20% de commission sur chaque deal, soit 3 000 € par client signé."
  page3_cta: Devenir ambassadeur
  page4_title: Du Hobbit à 12 ans au conseil de 20 agents IA
  page4_desc: Figurines en plomb, philosophie au lycée, luxe à la française, trahison humaine — et la naissance du Synedre. La vraie histoire.
  page4_cta: Lire l'histoire du Synedre
  page5_title: Pourquoi ce système devient exponentiel à chaque tour
  page5_desc: Data souveraine, architecture headless, IA qui apprend — les boucles de rétroaction cachées qui font que le tour 4 coûte moins cher que le tour 1.
  page5_cta: Comprendre la théorie

