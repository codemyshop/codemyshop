ctafinal:
  heading: Ready to take back control?
  lede: A 30-minute call. No sales pitch. A clear diagnosis of your e-commerce situation, your SEO blockers, and concrete AI opportunities for your business.
  cta_book: Book my free strategic call
  cta_full: Booked out this month
  signature: Alexandre Carette · CodeMyShop founder · Metz, France

probleme:
  kicker: The reality
  heading: You're paying for a system that isn't yours.
  lede: Six realities French e-commerce merchants face in 2026.
  pain1_title: Commissions that keep climbing
  pain1_desc: SaaS platforms take 0.5 to 2% commission on every sale, on top of third-party app subscriptions. As your revenue grows, these costs scale proportionally.
  pain2_title: Platform-throttled SEO
  pain2_desc: Forced URLs, mediocre speed, Core Web Vitals in the red. Google penalizes you and you can't do anything about it.
  pain3_title: Data outside France
  pain3_desc: Your customers, orders, and catalog sit on US servers. One ToS change and you lose access to your own business.
  pain4_title: Your data fuels your competitors' AI
  pain4_desc: "On shared platforms, your customers' behavior improves the global algorithm — which benefits everyone but you. Your business intelligence feeds your competitors' machine."
  pain5_title: Lean team, too many tools
  pain5_desc: One tool for SEO, one for email, one for social, one for CRM. Nothing talks to each other. You manage your tools instead of selling.
  pain6_title: Total dependency
  pain6_desc: A decision made in San Francisco can shut down your shop overnight. You're a tenant of your own storefront.

navpages:
  heading: Go further
  lede: Four pages to understand who I am and why this is different.
  page1_title: Why digital sovereignty is urgent
  page1_desc: In 2026, depending on a US platform for your e-commerce means accepting you control nothing. I wrote why — and what I'm doing to change it.
  page1_cta: Read the manifesto
  page2_title: From my dad's Macintosh to CodeMyShop
  page2_desc: Computers at 5, AOL hacker rooms at 13, skateboard brand at 24, PrestaShop expert at 35. The story behind 10 years of e-commerce obsession.
  page2_cta: Discover my journey
  page3_title: Distribute our infrastructure to your network
  page3_desc: "Become a CodeMyShop ambassador. 20% commission on every deal — €3,000 per signed client."
  page3_cta: Become an ambassador
  page4_title: From The Hobbit at 12 to a council of 20 AI agents
  page4_desc: Lead figurines, high-school philosophy, French luxury, human betrayal — and the birth of the Synedre. The real story.
  page4_cta: Read the Synedre story
  page5_title: Why this system grows exponential each loop
  page5_desc: Sovereign data, headless architecture, learning AI — the hidden feedback loops that make loop 4 cheaper than loop 1.
  page5_cta: Understand the theory

