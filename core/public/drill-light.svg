<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 160 260 300" width="512" height="512" role="img" aria-labelledby="drill-title drill-desc">
  <title id="drill-title">Le Drill</title>
  <desc id="drill-desc">Pictogramme du Drill : plateforme flottante d'entraînement des agents IA du Synedre.</desc>

  <!-- Colonne -->
  <rect x="248" y="295" width="16" height="145" rx="8" fill="#4F46E5" opacity="0.4"/>

  <!-- Plateforme -->
  <ellipse cx="256" cy="230" rx="100" ry="14" fill="#4F46E5" opacity="0.1"/>
  <ellipse cx="256" cy="230" rx="100" ry="14" fill="none" stroke="#4F46E5" stroke-width="1.4" opacity="0.5"/>

  <!-- Coupole inversée évasée -->
  <path d="M 156 230 Q 156 280 256 295 Q 356 280 356 230" fill="#4F46E5" opacity="0.05"/>
  <path d="M 156 230 Q 156 280 256 295 Q 356 280 356 230" fill="none" stroke="#4F46E5" stroke-width="1.4" opacity="0.5"/>

  <!-- Sablier central -->
  <polygon points="244,185 268,185 256,210 244,185" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="244,230 268,230 256,210 244,230" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Sapin gauche — losange -->
  <line x1="185" y1="230" x2="185" y2="212" stroke="#4F46E5" stroke-width="0.8" opacity="0.3"/>
  <polygon points="185,193 177,207 185,221 193,207" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Sapin droit — losange -->
  <line x1="327" y1="230" x2="327" y2="212" stroke="#4F46E5" stroke-width="0.8" opacity="0.3"/>
  <polygon points="327,193 319,207 327,221 335,207" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Point central -->
  <circle cx="256" cy="178" r="4" fill="#ec4899" opacity="0.7"/>
</svg>
