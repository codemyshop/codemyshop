version: '3.9'

# CodeMyShop — single-tenant Docker Compose example.
# Copy `.env.example` to `.env` and fill in the secrets, then `docker compose up -d`.
# See INSTALL.md for production hardening (TLS, backups, scaling).

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codemyshop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-codemyshop}
      POSTGRES_USER: ${PG_USER:-codemyshop}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [codemyshop]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codemyshop_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [codemyshop]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nuxt:
    # By default we pull the published image. To run from local sources,
    # comment out the `image:` line and uncomment `build: .`.
    image: ghcr.io/codemyshop/codemyshop:${CODEMYSHOP_VERSION:-latest}
    # build: .
    container_name: codemyshop_nuxt
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${PG_USER:-codemyshop}:${PG_PASSWORD}@postgres:5432/${PG_DB:-codemyshop}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NUXT_SECRET: ${NUXT_SECRET}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      PG_SCHEMA: ${PG_SCHEMA:-codemyshop}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks: [codemyshop]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: codemyshop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [codemyshop]
    depends_on:
      - nuxt

volumes:
  postgres_data:
  redis_data:

networks:
  codemyshop:
    driver: bridge
